  let currentType = '';
  
  EXAM_DATA.forEach(q => {
    if (q.type !== currentType) {
      currentType = q.type;
      html += `<div class="form-section"><div class="section-title">${
        currentType === '单选' ? '📝 单选题' : 
        currentType === '多选' ? '📝 多选题' : 
        currentType === '判断' ? '📝 判断题' : '📝 场景应用题'
      }</div>`;
    }
    
    html += `<div class="question-card" id="qcard-${q.num}">`;
    html += `<div class="q-header"><span class="q-num">第${q.num}题</span><span class="q-type ${q.type}">${q.type}</span><span class="q-score">${q.score}分</span></div>`;
    html += `<div class="q-title">${q.title}</div>`;
    
    if (q.type === '场景应用') {
      html += `<textarea class="scenario-textarea" id="scenario-${q.num}" placeholder="请在此作答..." oninput="onAnswer(${q.num}, this.value)"></textarea>`;
    } else {
      html += `<div class="options">`;
      q.options.forEach(opt => {
        const clickHandler = q.type === '多选' 
          ? `selectOption(${q.num}, '${opt.key}', '多选')`
          : `selectOption(${q.num}, '${opt.key}', '${q.type}')`;
        html += `<div class="option-item" id="opt-${q.num}-${opt.key}" onclick="${clickHandler}"><div class="option-key">${opt.key}</div><div class="option-text">${opt.text}</div></div>`;
      });
      html += `</div>`;
    }
    
    html += `<div class="analysis-box" id="analysis-${q.num}"></div>`;
    html += `</div>`;
    
    // Close section on type change
    const nextQ = EXAM_DATA.find(x => x.num === q.num + 1);
    if (!nextQ || nextQ.type !== currentType) {
      html += `</div>`;
    }
  });

  area.innerHTML = html;
  startTimer();
}

function selectOption(qNum, key, type) {
  const q = EXAM_DATA.find(x => x.num === qNum);
  if (type === '多选') {
    if (!answers[qNum]) answers[qNum] = [];
    const idx = answers[qNum].indexOf(key);
    if (idx > -1) {
      answers[qNum].splice(idx, 1);
      document.getElementById(`opt-${qNum}-${key}`).classList.remove('selected');
    } else {
      answers[qNum].push(key);
      document.getElementById(`opt-${qNum}-${key}`).classList.add('selected');
    }
    if (answers[qNum].length === 0) delete answers[qNum];
  } else {
    q.options.forEach(opt => {
      document.getElementById(`opt-${qNum}-${opt.key}`).classList.remove('selected');
    });
    document.getElementById(`opt-${qNum}-${key}`).classList.add('selected');
    answers[qNum] = key;
  }
  updateProgress();
}

function onAnswer(qNum, value) {
  if (value.trim()) {
    answers[qNum] = value.trim();
  } else {
    delete answers[qNum];
  }
  updateProgress();
}

function updateProgress() {
  const total = EXAM_DATA.length;
  const answered = Object.keys(answers).length;
  document.getElementById('progressFill').style.width = (answered / total * 100) + '%';
  document.getElementById('progressText').textContent = `${answered}/${total}`;
}

function startTimer() {
  const totalSec = 90 * 60;
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const remain = Math.max(0, totalSec - elapsed);
    const min = Math.floor(remain / 60);
    const sec = remain % 60;
    document.getElementById('timer').textContent = `⏱ ${min}:${sec.toString().padStart(2, '0')}`;
    if (remain === 0) {
      clearInterval(timerInterval);
      submitExam();
    }
  }, 1000);
}

function submitExam() {
  const name = document.getElementById('userName').value.trim();
  const store = document.getElementById('userStore').value.trim();
  if (!name || !store) {
    alert('请填写姓名和门店！');
    return;
  }

  const answered = Object.keys(answers).length;
  if (answered < EXAM_DATA.length) {
    if (!confirm(`你还有${EXAM_DATA.length - answered}题未作答，确定提交吗？`)) return;
  }

  clearInterval(timerInterval);

  // Auto grade
  let totalScore = 0;
  let correct = 0;
  let wrong = 0;
  let unscored = 0;
  const wrongDetails = [];

  EXAM_DATA.forEach(q => {
    const card = document.getElementById(`qcard-${q.num}`);
    const analysisBox = document.getElementById(`analysis-${q.num}`);
    const userAns = answers[q.num];

    if (q.type === '场景应用') {
      unscored++;
      if (userAns) {
        analysisBox.innerHTML = `<div>⏳ 此题为人工评分题，将由管理员在3个工作日内评分。</div>`;
        analysisBox.style.display = 'block';
      }
      return;
    }

    let isCorrect = false;
    if (q.type === '多选') {
      const userArr = Array.isArray(userAns) ? [...userAns].sort() : [];
      const correctArr = q.answer.split('').sort();
      isCorrect = JSON.stringify(userArr) === JSON.stringify(correctArr);
    } else {
      isCorrect = userAns === q.answer;
    }

    if (isCorrect) {
      correct++;
      totalScore += q.score;
      card.classList.add('answered');
      if (q.type === '判断') {
        document.getElementById(`opt-${q.num}-${q.answer}`).classList.add('correct');
      } else {
        q.answer.split('').forEach(k => {
          document.getElementById(`opt-${q.num}-${k}`).classList.add('correct');
        });
      }
    } else {
      wrong++;
      wrongDetails.push({ num: q.num, answer: q.answer, userAns: Array.isArray(userAns) ? userAns.join('') : (userAns || '未答') });
      card.classList.add('wrong');
      if (Array.isArray(userAns)) {
        userAns.forEach(k => {
          if (!q.answer.includes(k)) {
            document.getElementById(`opt-${q.num}-${k}`).classList.add('wrong-pick');
          }
        });
      } else if (userAns) {
        document.getElementById(`opt-${q.num}-${userAns}`).classList.add('wrong-pick');
      }
      if (q.type === '判断') {
        document.getElementById(`opt-${q.num}-${q.answer}`).classList.add('correct');
      } else {
        q.answer.split('').forEach(k => {
          const el = document.getElementById(`opt-${q.num}-${k}`);
          if (el && !el.classList.contains('wrong-pick')) el.classList.add('correct');
        });
      }
    }

    analysisBox.innerHTML = `<div><span class="ans-label">正确答案：</span>${q.answer}</div>` +
      (userAns ? `<div><span class="your-label">你的答案：</span>${Array.isArray(userAns) ? userAns.join('') : userAns}</div>` : '') +
      (q.analysis ? `<div style="margin-top:6px;color:#333">💡 ${q.analysis}</div>` : '');
    analysisBox.style.display = 'block';
  });

  const panel = document.getElementById('resultPanel');
  panel.style.display = 'block';
  document.getElementById('resultScore').textContent = totalScore;
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rUnscored').textContent = unscored;

  const status = document.getElementById('resultStatus');
  if (totalScore >= 80) {
    status.textContent = '✅ 及格通过';
    status.className = 'result-status pass';
  } else {
    status.textContent = '❌ 未达及格线，请继续学习';
    status.className = 'result-status fail';
  }

  panel.scrollIntoView({ behavior: 'smooth' });
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = '已提交';
  document.getElementById('submitScoreArea').style.display = 'block';

  window._examResult = { name, store, score: totalScore, correct, wrong, unscored, pass: totalScore >= 80, wrongDetails };
}

function copyResult() {
  const r = window._examResult;
  if (!r) return;
  const now = new Date();
  const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const passStr = r.pass ? '是' : '否';
  const text = `【考核成绩参考】
姓名：${r.name}
门店：${r.store}
客观题得分：${r.score}/30
总分：${r.score}（场景题待评分）
是否达标：${passStr}
考核月份：7月
品牌组合：智己VS特斯拉`;
  navigator.clipboard.writeText(text).then(() => {
    const el2 = document.getElementById('copyResult2');
    if (el2) { el2.style.display = 'block'; setTimeout(() => el2.style.display = 'none', 3000); }
  });
}

function submitScore() {
  const r = window._examResult;
  if (!r) return;

  const now = new Date();
  const pad = n => n.toString().padStart(2, '0');
  const dateStr = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;

  let wrongText = '';

    wrongText = r.wrongDetails.map(w => `第${w.num}题: 正确答案${w.answer}，你的答案${w.userAns}`).join('；');
  } else {
    wrongText = '无';
  }

  const weakPoints = r.wrong > 0 ? `共答错${r.wrong}道客观题，需加强复习` : '全部正确';

  const baseUrl = 'https://lcnqe6c8w8pi.feishu.cn/share/base/shrcn6DY8tokL1EtbYGmEt3pxlh';
  const params = new URLSearchParams();

  params.set('prefill_员工姓名', r.name);
  params.set('prefill_考试日期', dateStr);
  params.set('prefill_考试轮次', '第1轮');
  params.set('prefill_总分', r.score.toString());
  params.set('prefill_是否达标', passStr);
  params.set('prefill_状态', '已评分');
  params.set('prefill_错题详情', wrongText);
  params.set('prefill_薄弱知识点', weakPoints);
  params.set('prefill_考核月份', '7月');
  params.set('prefill_品牌组合', '智己VS特斯拉');
  params.set('prefill_客观题得分', r.score.toString());
  params.set('prefill_场景题得分', '0');
  params.set('prefill_答题提交时间', `${dateStr} ${timeStr}`);

  params.set('hide_员工姓名', '1');
  params.set('hide_考试日期', '1');
  params.set('hide_考试轮次', '1');
  params.set('hide_总分', '1');
  params.set('hide_是否达标', '1');
  params.set('hide_状态', '1');
  params.set('hide_错题详情', '1');
  params.set('hide_薄弱知识点', '1');
  params.set('hide_考核月份', '1');
  params.set('hide_品牌组合', '1');
  params.set('hide_客观题得分', '1');
  params.set('hide_场景题得分', '1');
  params.set('hide_答题提交时间', '1');

  const formUrl = `${baseUrl}?${params.toString()}`;
  window.open(formUrl, '_blank');

  const toast = document.getElementById('toastOverlay');
  toast.classList.add('show');

  const btn = document.querySelector('.submit-score-btn');
  btn.textContent = '✅ 已打开表单，点击提交即可';
  btn.style.background = 'linear-gradient(135deg, #b7eb8f 0%, #95de64 100%)';
  btn.style.cursor = 'default';

  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

init();
</script>
