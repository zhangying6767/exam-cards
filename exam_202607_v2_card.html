const answers = {};

function renderExam() {
  const container = document.getElementById('examContainer');
  const sections = [
    { type: '单选', title: '一、单选题', sub: '共20题，每题2分，共40分', items: questions.filter(q=>q.type==='单选') },
    { type: '多选', title: '二、多选题', sub: '共5题，每题4分，共20分（多选、少选、错选均不得分）', items: questions.filter(q=>q.type==='多选') },
    { type: '判断', title: '三、判断题', sub: '共10题，每题1分，共10分', items: questions.filter(q=>q.type==='判断') },
    { type: '场景应用', title: '四、场景应用题', sub: '共2题，每题15分，共30分', items: questions.filter(q=>q.type==='场景应用') }
  ];
  
  let html = '';
  for (const sec of sections) {
    html += '<div class="section"><div class="section-title">' + sec.title + '</div><div class="section-subtitle">' + sec.sub + '</div>';
    for (const q of sec.items) {
      const isScene = q.type === '场景应用';
      html += '<div class="question-card" id="qcard-' + q.num + '">';
      html += '<div class="q-header"><span class="q-num">' + q.num + '</span><span class="q-score">' + q.score + '分</span><span class="q-type">' + q.type + '</span></div>';
      html += '<div class="q-title">' + escapeHtml(q.title) + '</div>';
      
      if (isScene) {
        html += '<textarea class="scene-input" id="ans-' + q.num + '" placeholder="请在此作答..." oninput="onAnswer(' + q.num + ')"></textarea>';
      } else if (q.type === '多选') {
        html += '<div class="options">';
        for (const opt of q.options) {
          html += '<div class="option" id="opt-' + q.num + '-' + opt.key + '" onclick="toggleMulti(' + q.num + ',\'' + opt.key + '\')">';
          html += '<input type="checkbox" id="cb-' + q.num + '-' + opt.key + '"><label for="cb-' + q.num + '-' + opt.key + '">' + escapeHtml(opt.key + '. ' + opt.text) + '</label></div>';
        }
        html += '</div>';
      } else {
        html += '<div class="options">';
        for (const opt of q.options) {
          html += '<div class="option" id="opt-' + q.num + '-' + opt.key + '" onclick="selectSingle(' + q.num + ',\'' + opt.key + '\')">';
          html += '<input type="radio" name="r-' + q.num + '" id="r-' + q.num + '-' + opt.key + '"><label for="r-' + q.num + '-' + opt.key + '">' + escapeHtml(opt.key + '. ' + opt.text) + '</label></div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function selectSingle(num, key) {

  const q = questions.find(x=>x.num===num);
  for (const opt of q.options) {
    document.getElementById('opt-' + num + '-' + opt.key).classList.toggle('selected', opt.key === key);
    document.getElementById('r-' + num + '-' + opt.key).checked = (opt.key === key);
  }
  updateProgress();
}

function toggleMulti(num, key) {
  if (!answers[num]) answers[num] = [];
  const idx = answers[num].indexOf(key);
  if (idx >= 0) answers[num].splice(idx, 1);
  else answers[num].push(key);
  if (answers[num].length === 0) delete answers[num];
  else answers[num].sort();
  
  const q = questions.find(x=>x.num===num);
  for (const opt of q.options) {
    const checked = answers[num] && answers[num].includes(opt.key);
    document.getElementById('opt-' + num + '-' + opt.key).classList.toggle('selected', checked);
    document.getElementById('cb-' + num + '-' + opt.key).checked = checked;
  }
  updateProgress();
}

function onAnswer(num) {
  const val = document.getElementById('ans-' + num).value.trim();
  if (val) answers[num] = val;
  else delete answers[num];
  updateProgress();
}

function updateProgress() {
  const done = Object.keys(answers).length;
  const total = questions.length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('undoneCount').textContent = total - done;
  document.getElementById('progressFill').style.width = (done/total*100) + '%';
  document.getElementById('progressText').textContent = '已完成 ' + done + '/' + total + ' 题';
  
  for (const q of questions) {
    const card = document.getElementById('qcard-' + q.num);
    if (card) card.classList.toggle('answered', !!answers[q.num]);
  }
}

function submitExam() {
  const done = Object.keys(answers).length;
  if (done < questions.length) {
    if (!confirm('你还有 ' + (questions.length - done) + ' 题未作答，确定要提交吗？')) return;
  }
  
  let result = '置换评估师7月考核答案\n';
  result += '========================\n\n';
  
  const sorted = questions.slice().sort((a,b)=>a.num-b.num);
  for (const q of sorted) {
    const ans = answers[q.num];
    if (q.type === '场景应用') {
      result += q.num + '. ' + (ans || '(未作答)') + '\n\n';
    } else {
      const ansText = Array.isArray(ans) ? ans.join('') : (ans || '未作答');
      result += q.num + '.' + ansText + ' ';
    }
  }
  
  document.getElementById('resultText').textContent = result;
  document.getElementById('resultOverlay').classList.add('show');
}

function copyResult() {
  const text = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(text).then(function(){
    showToast('✅ 已复制到剪贴板');
  }).catch(function(){
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 已复制到剪贴板');
  });
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1500);
}

renderExam();
</script>
</body>
</html>
