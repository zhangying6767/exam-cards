景", "answer": "", "analysis": "评分要点：1）认可客户痛点（车机卡顿、续航不足）确实存在；2）Model 3续航634km vs ID.3的451km，直接翻倍；3）车机体验质的飞跃（15.4英寸大屏、流畅系统、OTA升级）；4）售后方面：特斯拉中国服务网点持续扩张，超充站覆盖广，支持上门服务和移动服务车；5）保值率对比（ID.3 42% vs Model 3 68%），趁ID.3还有残值尽早置换；6）给出具体金融方案建议。", "category": ""}];

function renderQuestions() {

    html += `<div class="analysis-box" id="analysis-${q.num}"></div></div>`;
  });
  if (currentType) html += '</div>';
  area.innerHTML = html;
  startTimer();
}

function selectOption(qNum, key, type) {
  const q = EXAM_DATA.find(x => x.num === qNum);
  if (type === '多选') {
    if (!answers[qNum]) answers[qNum] = [];
    const idx = answers[qNum].indexOf(key);
    if (idx > -1) { answers[qNum].splice(idx, 1); document.getElementById(`opt-${qNum}-${key}`).classList.remove('selected'); }
    else { answers[qNum].push(key); document.getElementById(`opt-${qNum}-${key}`).classList.add('selected'); }
    if (answers[qNum].length === 0) delete answers[qNum];
  } else {
    q.options.forEach(opt => { document.getElementById(`opt-${qNum}-${opt.key}`).classList.remove('selected'); });
    document.getElementById(`opt-${qNum}-${key}`).classList.add('selected');
    answers[qNum] = key;
  }
  updateProgress();
}

function onAnswer(qNum, value) {
  if (value.trim()) answers[qNum] = value.trim();
  else delete answers[qNum];
  updateProgress();
}

function updateProgress() {
  const total = EXAM_DATA.length;
  const answered = Object.keys(answers).length;
  document.getElementById('progressFill').style.width = (answered / total * 100) + '%';
  document.getElementById('progressText').textContent = `${answered}/${total}`;
}

function startTimer() {
  const totalSec = EXAM_MINUTES * 60;
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const remain = Math.max(0, totalSec - elapsed);
    const min = Math.floor(remain / 60);
    const sec = remain % 60;
    document.getElementById('timer').textContent = `⏱ ${min}:${sec.toString().padStart(2, '0')}`;
    if (remain === 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

function submitExam() {
  const name = document.getElementById('userName').value.trim();
  const store = document.getElementById('userStore').value.trim();
  if (!name || !store) { alert('请填写姓名和门店！'); return; }
  const answered = Object.keys(answers).length;
  if (answered < EXAM_DATA.length) {
    if (!confirm(`你还有${EXAM_DATA.length - answered}题未作答，确定提交吗？`)) return;
  }
  clearInterval(timerInterval);
  let totalScore = 0, correct = 0, wrong = 0, unscored = 0;
  const wrongDetails = [];
  EXAM_DATA.forEach(q => {
    const card = document.getElementById(`qcard-${q.num}`);
    const analysisBox = document.getElementById(`analysis-${q.num}`);
    const userAns = answers[q.num];
    if (['置换场景','对标场景','场景应用'].includes(q.type)) {
      unscored++;
      if (userAns) { analysisBox.innerHTML = '<div>⏳ 此题为人工评分题，将由管理员在3个工作日内评分。</div>'; analysisBox.style.display = 'block'; }
      return;
    }
    let isCorrect = false;
    if (q.type === '多选') {
      const userArr = Array.isArray(userAns) ? [...userAns].sort() : [];
      const correctArr = q.answer.split('').sort();
      isCorrect = JSON.stringify(userArr) === JSON.stringify(correctArr);
    } else { isCorrect = userAns === q.answer; }
    if (isCorrect) {
      correct++; totalScore += q.score; card.classList.add('answered');
      if (q.type === '判断') document.getElementById(`opt-${q.num}-${q.answer}`).classList.add('correct');
      else q.answer.split('').forEach(k => { const el = document.getElementById(`opt-${q.num}-${k}`); if(el) el.classList.add('correct'); });
    } else {
      wrong++;
      wrongDetails.push({ num: q.num, answer: q.answer, userAns: Array.isArray(userAns) ? userAns.join('') : (userAns || '未答') });
      card.classList.add('wrong');
      if (Array.isArray(userAns)) userAns.forEach(k => { const el = document.getElementById(`opt-${q.num}-${k}`); if(el && !el.classList.contains('correct')) el.classList.add('wrong-pick'); });
      else if (userAns) { const el = document.getElementById(`opt-${q.num}-${userAns}`); if(el) el.classList.add('wrong-pick'); }
      if (q.type === '判断') document.getElementById(`opt-${q.num}-${q.answer}`).classList.add('correct');
      else q.answer.split('').forEach(k => { const el = document.getElementById(`opt-${q.num}-${k}`); if(el && !el.classList.contains('wrong-pick')) el.classList.add('correct'); });
    }
    analysisBox.innerHTML = `<div><span class="ans-label">正确答案：</span>${q.answer}</div>` +
      (userAns ? `<div><span class="your-label">你的答案：</span>${Array.isArray(userAns) ? userAns.join('') : userAns}</div>` : '') +
      (q.analysis ? `<div style="margin-top:6px;color:#333">💡 ${q.analysis}</div>` : '');
    analysisBox.style.display = 'block';
  });
  const panel = document.getElementById('resultPanel');
  panel.style.display = 'block';
  document.getElementById('resultScore').textContent = totalScore;
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rUnscored').textContent = unscored;
  const status = document.getElementById('resultStatus');
  if (totalScore >= 40.0) { status.textContent = '✅ 客观题达标'; status.className = 'result-status pass'; }
  else { status.textContent = '❌ 客观题未达标，请继续学习'; status.className = 'result-status fail'; }
  panel.scrollIntoView({ behavior: 'smooth' });
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = '已提交';
  document.getElementById('submitScoreArea').style.display = 'block';
  window._examResult = { name, store, score: totalScore, correct, wrong, unscored, pass: totalScore >= 40.0, wrongDetails };
}

function submitScore() {
  const r = window._examResult;
  if (!r) return;
  const now = new Date();
  const pad = n => n.toString().padStart(2, '0');
  const dateStr = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const passStr = r.pass ? '是' : '否';
  let wrongText = '';
  if (r.wrongDetails && r.wrongDetails.length > 0)
    wrongText = r.wrongDetails.map(w => `第${w.num}题: 正确答案${w.answer}，你的答案${w.userAns}`).join('；');
  else wrongText = '无';
  const weakPoints = r.wrong > 0 ? `共答错${r.wrong}道客观题，需加强复习` : '全部正确';
  const baseUrl = 'https://lcnqe6c8w8pi.feishu.cn/share/base/shrcn6DY8tokL1EtbYGmEt3pxlh';
  const params = new URLSearchParams();
  params.set('prefill_员工姓名', r.name);
  params.set('prefill_考试日期', dateStr);
  params.set('prefill_考试轮次', '第1轮');
  params.set('prefill_总分', r.score.toString());
  params.set('prefill_是否达标', passStr);
  params.set('prefill_状态', '已评分');
  params.set('prefill_错题详情', wrongText);
  params.set('prefill_薄弱知识点', weakPoints);
  params.set('prefill_考核月份', '7月');
  params.set('prefill_品牌组合', '大众VS特斯拉');
  params.set('prefill_客观题得分', r.score.toString());
  params.set('prefill_场景题得分', '0');
  params.set('prefill_答题提交时间', `${dateStr} ${timeStr}`);
  ['员工姓名','考试日期','考试轮次','总分','是否达标','状态','错题详情','薄弱知识点','考核月份','品牌组合','客观题得分','场景题得分','答题提交时间'].forEach(f => params.set('hide_' + f, '1'));
  window.open(`${baseUrl}?${params.toString()}`, '_blank');
  document.getElementById('toastOverlay').classList.add('show');
  const btn = document.querySelector('.submit-score-btn');
  btn.textContent = '✅ 已打开表单，点击提交即可';
  setTimeout(() => document.getElementById('toastOverlay').classList.remove('show'), 3000);
}

init();
</script>
